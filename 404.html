<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Art Tourism Toronto</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="404.js" defer></script>
</head>

<body class="theme-purple page-404">
  <main class="error-stage" id="error-stage">
    <div class="error-gradient" aria-hidden="true"></div>
    <div class="error-scanlines" aria-hidden="true"></div>
    <div class="error-noise" aria-hidden="true"></div>

    <div class="poster-field" id="poster-field" aria-hidden="true">
      <span class="poster-fragment frag-1">ART</span>
      <span class="poster-fragment frag-2">TOURISM</span>
      <span class="poster-fragment frag-3">TORONTO</span>
      <span class="poster-fragment frag-4">EXHIBIT</span>
      <span class="poster-fragment frag-5">MAP</span>
      <span class="poster-fragment frag-6">MUSEUM</span>
      <span class="poster-fragment frag-7">ROUTE</span>
      <span class="poster-fragment frag-8">ARCHIVE</span>
    </div>

    <div class="error-content">
      <p class="error-kicker">Lost in the city archive</p>
      <h1 class="error-code">404</h1>
      <p class="error-line">
        This page wandered off and became part of the exhibition.
      </p>
      <p class="error-instruction">
        Tap or click anywhere to reveal the hidden poster fragments. (TBD)
      </p>

      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Explore more</a>
        
      </div>
    </div>
  </main>
</body>
</html>
